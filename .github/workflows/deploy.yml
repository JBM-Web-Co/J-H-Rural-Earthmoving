name: Deploy

on:
    workflow_dispatch:
        inputs:
            environment:
                description: Deployment target
                required: true
                type: choice
                options:
                    - preview
                    - production

permissions:
    contents: read

jobs:
    checks:
        uses: ./.github/workflows/checks.yml

    # ── Deploy ─────────────────────────────────────────────────────────────────

    deploy:
        name: Deploy to Vercel
        needs:
            - checks
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Deploy to Vercel
              run: |
                  npx vercel pull --yes --environment=${{ inputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}
                  npx vercel build ${{ inputs.environment == 'production' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
                  npx vercel deploy --prebuilt ${{ inputs.environment == 'production' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
